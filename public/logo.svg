<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="100" cy="100" r="70" fill="url(#grad1)" opacity="0.05"/>
  <!-- Hand/Grab icon -->
  <g transform="translate(50, 45)" filter="url(#glow)">
    <!-- Palm -->
    <path d="M50 85 C25 85 10 70 10 50 L10 35 C10 30 15 27 20 27 C25 27 28 30 28 35 L28 20 C28 15 33 12 38 12 C43 12 46 15 46 20 L46 15 C46 10 51 7 56 7 C61 7 64 10 64 15 L64 20 C64 15 69 12 74 12 C79 12 82 15 82 20 L82 55 C82 72 68 85 50 85Z"
          fill="url(#grad1)" stroke="url(#grad2)" stroke-width="2"/>
    <!-- Finger lines -->
    <line x1="28" y1="35" x2="28" y2="50" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>
    <line x1="46" y1="20" x2="46" y2="50" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>
    <line x1="64" y1="20" x2="64" y2="50" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>
    <!-- Sparkle -->
    <circle cx="88" cy="8" r="3" fill="#fbbf24"/>
    <circle cx="95" cy="18" r="2" fill="#fbbf24" opacity="0.6"/>
    <circle cx="5" cy="15" r="2.5" fill="#a855f7" opacity="0.5"/>
  </g>
  <!-- "IT" highlight arc -->
  <path d="M 60 150 Q 100 165 140 150" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
